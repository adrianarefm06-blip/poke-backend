<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokewiki & Team Builder</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        :root {
            --bg-color: #f4f4f4;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(0, 0, 0, 0.1);
            --primary: #e3350d;
            --primary-glow: rgba(227, 53, 13, 0.4);
            --secondary: #222224;
            --danger: #ef4444;
            --text-main: #222224;
            --text-muted: #666666;
            --font-main: 'Outfit', sans-serif;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            background-image: linear-gradient(
                to bottom, 
                var(--primary) 0%, 
                var(--primary) calc(50vh - 10px), 
                var(--secondary) calc(50vh - 10px), 
                var(--secondary) calc(50vh + 10px), 
                var(--bg-color) calc(50vh + 10px), 
                var(--bg-color) 100%
            );
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Login / Auth Section */
        #authSection {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1000;
            background: transparent;
            transition: opacity 0.5s ease;
        }

        .auth-container {
            background: var(--white);
            border: 12px solid var(--secondary);
            border-radius: 50%;
            padding: 40px;
            width: 90vw;
            max-width: 450px;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 0 0 10px var(--white), 0 0 25px 10px rgba(0,0,0,0.4);
            text-align: center;
            position: relative;
        }

        .auth-container h2 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 25px;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            position: relative;
            width: 100%;
        }

        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border-radius: 25px;
            background: #f0f0f0;
            border: 2px solid #ddd;
            color: var(--text-main);
            font-family: var(--font-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
            background: var(--white);
        }

        .btn-auth {
            background: var(--primary);
            color: white;
            border: 2px solid var(--secondary);
            padding: 15px;
            border-radius: 25px;
            font-family: var(--font-main);
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-auth:hover {
            background: #b32a0a;
            box-shadow: 0 5px 15px var(--primary-glow);
            transform: translateY(-2px);
        }

        .toggle-auth {
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .toggle-auth span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 800;
            transition: color 0.3s ease;
        }

        .toggle-auth span:hover {
            color: var(--secondary);
            text-decoration: underline;
        }

        /* App Layout */
        #appContainer {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .navbar {
            width: 100%;
            padding: 20px 40px;
            background: var(--primary);
            border-bottom: 10px solid var(--secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .navbar h1 {
            font-size: 2rem;
            font-weight: 900;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 var(--secondary);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-greeting {
            font-weight: 600;
            color: var(--text-main);
        }

        .btn-logout {
            background: var(--white);
            color: var(--secondary);
            border: 2px solid var(--secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-family: var(--font-main);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-logout:hover {
            background: #e5e5e5;
            transform: scale(1.05);
        }

        .main-container {
            display: flex;
            width: 100%;
            max-width: 1400px;
            padding: 40px 20px;
            gap: 40px;
            flex-wrap: wrap;
        }

        .search-section {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        .search-box input {
            width: 100%;
            padding: 18px 24px 18px 50px;
            border-radius: 50px;
            background: var(--white);
            border: 3px solid var(--secondary);
            color: var(--text-main);
            font-size: 1.1rem;
            font-family: var(--font-main);
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 6px 0 var(--secondary);
        }

        .search-box input:focus {
            transform: translateY(2px);
            box-shadow: 0 4px 0 var(--secondary);
        }

        .search-box i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        .results-grid::-webkit-scrollbar {
            width: 8px;
        }

        .results-grid::-webkit-scrollbar-track {
            background: transparent;
        }

        .results-grid::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .pokemon-card {
            background: var(--white);
            border: 3px solid var(--secondary);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: all 0.2s ease;
            box-shadow: 0 6px 0 var(--secondary);
        }

        .pokemon-card:hover {
            transform: translateY(2px);
            box-shadow: 0 4px 0 var(--secondary);
        }

        .poke-sprite {
            width: 96px;
            height: 96px;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
            transition: transform 0.3s ease;
        }

        .pokemon-card:hover .poke-sprite {
            transform: scale(1.1);
        }

        .poke-info-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .poke-id {
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 700;
            border: 1px solid #ddd;
        }

        .poke-name {
            font-size: 1.3rem;
            font-weight: 600;
            text-transform: capitalize;
            color: var(--text-main);
            text-align: center;
        }

        .btn-add {
            background: var(--white);
            color: var(--secondary);
            border: 2px solid var(--secondary);
            padding: 10px 20px;
            border-radius: 25px;
            font-family: var(--font-main);
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover {
            background: var(--primary);
            color: var(--white);
            border-color: var(--secondary);
        }

        .team-section {
            width: 380px;
            background: var(--white);
            border: 4px solid var(--secondary);
            border-radius: 24px;
            padding: 30px;
            height: fit-content;
            box-shadow: 0 8px 0 var(--secondary);
        }

        .team-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px dashed var(--secondary);
        }

        .team-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .team-count {
            background: #f0f0f0;
            color: var(--secondary);
            border: 2px solid var(--secondary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 800;
        }

        .team-count.full {
            background: var(--primary);
            color: var(--white);
        }

        .team-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .team-member {
            background: var(--white);
            border: 2px solid var(--secondary);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            animation: slideIn 0.3s ease forwards;
            box-shadow: 0 3px 0 var(--secondary);
        }

        .team-member:hover {
            transform: translateY(2px);
            box-shadow: 0 1px 0 var(--secondary);
        }

        .member-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .member-name {
            font-weight: 600;
            text-transform: capitalize;
            font-size: 1.1rem;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .btn-remove {
            background: var(--white);
            color: var(--danger);
            border: 2px solid var(--danger);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-remove:hover {
            background: var(--danger);
            color: var(--white);
            transform: rotate(90deg);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--secondary);
            border: 3px solid var(--secondary);
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.error {
            border-left: 4px solid var(--danger);
        }

        .toast.success {
            border-left: 4px solid #10b981;
        }

        .loader {
            border: 4px solid var(--white);
            border-top: 4px solid var(--primary);
            border-bottom: 4px solid var(--secondary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
                padding: 20px 15px;
                gap: 25px;
            }

            .team-section {
                width: 100%;
                padding: 25px 20px;
            }

            .results-grid {
                max-height: 50vh;
            }
        }

        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                padding: 15px;
                gap: 15px;
            }

            .navbar h1 {
                font-size: 1.6rem;
            }

            .user-profile {
                width: 100%;
                justify-content: space-between;
                font-size: 0.95rem;
            }

            .btn-logout {
                padding: 6px 12px;
                font-size: 0.85rem;
            }

            .auth-container {
                margin: 20px;
                padding: 30px 20px;
                width: calc(100% - 40px);
            }

            .auth-container h2 {
                font-size: 1.6rem;
            }

            .search-box input {
                padding: 15px 20px 15px 45px;
                font-size: 1rem;
            }

            .results-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
                padding-right: 5px;
            }

            .pokemon-card {
                padding: 15px 10px;
                gap: 10px;
            }

            .poke-sprite {
                width: 70px;
                height: 70px;
            }

            .poke-name {
                font-size: 1.1rem;
            }

            .btn-add {
                padding: 8px 12px;
                font-size: 0.85rem;
            }

            .toast {
                left: 20px;
                right: 20px;
                bottom: 20px;
                justify-content: center;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <!-- AUTH SECTION -->
    <div id="authSection">
        <div class="auth-container">
            <h2 id="authTitle">Iniciar Sesión</h2>
            <form id="authForm" class="auth-form" onsubmit="handleAuth(event)">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Nombre de usuario" required autocomplete="off">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn-auth" id="btnAuthSubmit">
                    Entrar <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            <div class="toggle-auth">
                <p id="authToggleText">¿No tienes cuenta? <span onclick="toggleAuthMode()">Regístrate aquí</span></p>
            </div>
        </div>
    </div>

    <!-- APP SECTION -->
    <div id="appContainer">
        <nav class="navbar">
            <div class="navbar-brand">
                <h1>PokeWiki</h1>
            </div>
            <div class="user-profile">
                <span class="user-greeting">Hola, <span id="displayUsername">Entrenador</span>!</span>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </button>
            </div>
        </nav>

        <div class="main-container">
            <section class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Buscar Pokémon por nombre..." autocomplete="off">
                </div>
                <div id="loading" style="display:none;">
                    <div class="loader"></div>
                </div>
                <div class="results-grid" id="resultsGrid"></div>
            </section>

            <aside class="team-section">
                <div class="team-header">
                    <h2>Mi Equipo</h2>
                    <span class="team-count" id="teamCount">0/6</span>
                </div>
                <div class="team-list" id="teamList"></div>
            </aside>
        </div>
    </div>

    <div id="toast" class="toast">
        <i class="fas fa-info-circle"></i>
        <span id="toastMsg">Mensaje</span>
    </div>

    <script>
        // BACKEND URL
        const API_BASE = 'https://poke-backend-production-a7c8.up.railway.app/api';

        let teamData = [];
        let searchTimeout = null;
        let currentUser = null;
        let isLoginMode = true;

        const authSection = document.getElementById('authSection');
        const appContainer = document.getElementById('appContainer');
        const searchInput = document.getElementById('searchInput');
        const resultsGrid = document.getElementById('resultsGrid');
        const teamList = document.getElementById('teamList');
        const teamCount = document.getElementById('teamCount');
        const loading = document.getElementById('loading');

        // Check session on load
        document.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('pokeUser');
            if (savedUser) {
                currentUser = savedUser;
                showApp();
            }
        });

        // AUTHENTICATION LOGIC
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? 'Iniciar Sesión' : 'Crear Cuenta';
            document.getElementById('btnAuthSubmit').innerHTML = isLoginMode ? 'Entrar <i class="fas fa-arrow-right"></i>' : 'Registrarse <i class="fas fa-user-plus"></i>';
            document.getElementById('authToggleText').innerHTML = isLoginMode
                ? '¿No tienes cuenta? <span onclick="toggleAuthMode()">Regístrate aquí</span>'
                : '¿Ya tienes cuenta? <span onclick="toggleAuthMode()">Inicia sesión</span>';
        }

        async function handleAuth(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (!user || !pass) {
                showToast("Por favor, rellena todos los campos", "error");
                return;
            }

            const endpoint = isLoginMode ? '/users/login' : '/users/register';
            const btn = document.getElementById('btnAuthSubmit');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await res.json();

                if (res.ok) {
                    showToast(data.message || (isLoginMode ? "Login exitoso" : "Registro exitoso"), "success");
                    if (isLoginMode) {
                        currentUser = data.username || user;
                        localStorage.setItem('pokeUser', currentUser);
                        setTimeout(showApp, 500);
                    } else {
                        // Switch to login mode automatically after register
                        toggleAuthMode();
                        document.getElementById('password').value = '';
                    }
                } else {
                    showToast(data.error || "Error en la autenticación", "error");
                }
            } catch (error) {
                showToast("Error de conexión con el servidor", "error");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function showApp() {
            authSection.style.opacity = '0';
            setTimeout(() => {
                authSection.style.display = 'none';
                appContainer.style.display = 'flex';
                // Trigger reflow
                void appContainer.offsetWidth;
                appContainer.style.opacity = '1';

                document.getElementById('displayUsername').innerText = currentUser;
                loadTeam();
                searchPokemon('');
            }, 500);
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('pokeUser');

            appContainer.style.opacity = '0';
            setTimeout(() => {
                appContainer.style.display = 'none';
                authSection.style.display = 'flex';
                // Trigger reflow
                void authSection.offsetWidth;
                authSection.style.opacity = '1';

                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                teamData = [];
            }, 500);
        }

        // APP LOGIC
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchPokemon(e.target.value.trim());
            }, 300);
        });

        async function searchPokemon(query) {
            if (!currentUser) return;

            resultsGrid.innerHTML = '';
            loading.style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/pokemon/search?name=${query}`);
                const data = await res.json();

                loading.style.display = 'none';

                if (data.length === 0) {
                    resultsGrid.innerHTML = '<p style="color:var(--text-muted); width: 100%; text-align:center;">No se encontraron Pokémon.</p>';
                    return;
                }

                data.forEach(poke => {
                    const isEnEquipo = teamData.some(t => t.pokemonId === poke.id);

                    const card = document.createElement('div');
                    card.className = 'pokemon-card';
                    card.innerHTML = `
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${poke.id}.png" alt="${poke.name}" class="poke-sprite" loading="lazy">
                        <div class="poke-info-container">
                            <div class="poke-name">${poke.name}</div>
                            <span class="poke-id">#${poke.id.toString().padStart(4, '0')}</span>
                        </div>
                        <button class="btn-add" onclick="addToTeam(${poke.id}, '${poke.name}')" ${isEnEquipo ? 'disabled style="opacity:0.5; cursor:not-allowed;"' : ''}>
                            <i class="fas ${isEnEquipo ? 'fa-check' : 'fa-plus'}"></i> 
                            ${isEnEquipo ? 'En Equipo' : 'Añadir'}
                        </button>
                    `;
                    resultsGrid.appendChild(card);
                });
            } catch (error) {
                loading.style.display = 'none';
                showToast("Error al conectar con el servidor", "error");
            }
        }

        async function loadTeam() {
            if (!currentUser) return;

            try {
                const res = await fetch(`${API_BASE}/pokemon/team?username=${currentUser}`);
                teamData = await res.json();
                renderTeam();
                searchPokemon(searchInput.value.trim());
            } catch (error) {
                console.error("Error cargando equipo", error);
            }
        }

        function renderTeam() {
            teamCount.innerText = `${teamData.length}/6`;
            if (teamData.length >= 6) {
                teamCount.classList.add('full');
            } else {
                teamCount.classList.remove('full');
            }

            teamList.innerHTML = '';

            if (teamData.length === 0) {
                teamList.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:30px 0;"><p>Tu equipo está vacío.</p></div>';
                return;
            }

            teamData.forEach(member => {
                const div = document.createElement('div');
                div.className = 'team-member';
                div.innerHTML = `
                    <div class="member-info">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${member.pokemonId}.png" alt="${member.pokemonName}" style="width: 40px; height: 40px;">
                        <span class="member-name">${member.pokemonName}</span>
                    </div>
                    <button class="btn-remove" onclick="removeFromTeam(${member.id})">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                teamList.appendChild(div);
            });
        }

        async function addToTeam(pokemonId, pokemonName) {
            if (teamData.length >= 6) {
                showToast("¡Tu equipo ya está lleno!", "error");
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/pokemon/team`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pokemonId, pokemonName, username: currentUser })
                });

                if (res.ok) {
                    showToast(`${pokemonName.toUpperCase()} añadido`, "success");
                    loadTeam();
                } else {
                    const data = await res.json();
                    showToast(data.error || "Error al añadir", "error");
                }
            } catch (error) {
                showToast("Error de conexión", "error");
            }
        }

        async function removeFromTeam(id) {
            try {
                const res = await fetch(`${API_BASE}/pokemon/team/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast("Eliminado del equipo", "success");
                    loadTeam();
                }
            } catch (error) {
                showToast("Error de conexión", "error");
            }
        }

        function showToast(message, type = "success") {
            const toast = document.getElementById('toast');
            const msg = document.getElementById('toastMsg');
            toast.className = 'toast ' + type;
            msg.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>

</html>
