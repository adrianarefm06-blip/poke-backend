<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokewiki & Team Builder</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --secondary: #8b5cf6;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-main: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Login / Auth Section */
        #authSection {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            transition: opacity 0.5s ease;
        }

        .auth-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .auth-container h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            position: relative;
            width: 100%;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            font-family: var(--font-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .btn-auth {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-family: var(--font-main);
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-auth:hover {
            opacity: 0.9;
            box-shadow: 0 0 20px var(--primary-glow);
            transform: translateY(-2px);
        }

        .toggle-auth {
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .toggle-auth span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .toggle-auth span:hover {
            color: #60a5fa;
            text-decoration: underline;
        }

        /* App Layout */
        #appContainer {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .navbar {
            width: 100%;
            padding: 20px 40px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .navbar h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-greeting {
            font-weight: 600;
            color: var(--text-main);
        }
        
        .btn-logout {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-family: var(--font-main);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-logout:hover {
            background: var(--danger);
            color: white;
        }

        .main-container {
            display: flex;
            width: 100%;
            max-width: 1400px;
            padding: 40px 20px;
            gap: 40px;
            flex-wrap: wrap;
        }

        .search-section {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        .search-box input {
            width: 100%;
            padding: 18px 24px 18px 50px;
            border-radius: 50px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            font-size: 1.1rem;
            font-family: var(--font-main);
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            background: rgba(30, 41, 59, 0.9);
        }

        .search-box i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        .results-grid::-webkit-scrollbar { width: 8px; }
        .results-grid::-webkit-scrollbar-track { background: transparent; }
        .results-grid::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .pokemon-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .pokemon-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .poke-sprite {
            width: 96px;
            height: 96px;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            transition: transform 0.3s ease;
        }

        .pokemon-card:hover .poke-sprite {
            transform: scale(1.1);
        }

        .poke-info-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .poke-id {
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .poke-name {
            font-size: 1.3rem;
            font-weight: 600;
            text-transform: capitalize;
            color: var(--text-main);
            text-align: center;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-family: var(--font-main);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .team-section {
            width: 380px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            height: fit-content;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .team-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        .team-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .team-count {
            background: rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .team-count.full {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .team-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .team-member {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease forwards;
        }

        .member-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .member-name {
            font-weight: 600;
            text-transform: capitalize;
            font-size: 1.1rem;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .btn-remove {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-remove:hover {
            background: var(--danger);
            color: white;
            transform: rotate(90deg);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.error {
            border-left: 4px solid var(--danger);
        }
        
        .toast.success {
            border-left: 4px solid #10b981;
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; }
            .team-section { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- AUTH SECTION -->
    <div id="authSection">
        <div class="auth-container">
            <h2 id="authTitle">Iniciar Sesión</h2>
            <form id="authForm" class="auth-form" onsubmit="handleAuth(event)">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Nombre de usuario" required autocomplete="off">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn-auth" id="btnAuthSubmit">
                    Entrar <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            <div class="toggle-auth">
                <p id="authToggleText">¿No tienes cuenta? <span onclick="toggleAuthMode()">Regístrate aquí</span></p>
            </div>
        </div>
    </div>

    <!-- APP SECTION -->
    <div id="appContainer">
        <nav class="navbar">
            <div class="navbar-brand">
                <h1><i class="fas fa-compact-disc fa-spin-pulse"></i> PokeWiki</h1>
            </div>
            <div class="user-profile">
                <span class="user-greeting">Hola, <span id="displayUsername">Entrenador</span>!</span>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </button>
            </div>
        </nav>

        <div class="main-container">
            <section class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Buscar Pokémon por nombre..." autocomplete="off">
                </div>
                <div id="loading" style="display:none;"><div class="loader"></div></div>
                <div class="results-grid" id="resultsGrid"></div>
            </section>

            <aside class="team-section">
                <div class="team-header">
                    <h2>Mi Equipo</h2>
                    <span class="team-count" id="teamCount">0/6</span>
                </div>
                <div class="team-list" id="teamList"></div>
            </aside>
        </div>
    </div>

    <div id="toast" class="toast">
        <i class="fas fa-info-circle"></i>
        <span id="toastMsg">Mensaje</span>
    </div>

    <script>
        // BACKEND URL
        const API_BASE = 'https://poke-backend-production-a7c8.up.railway.app/api';
        
        let teamData = [];
        let searchTimeout = null;
        let currentUser = null;
        let isLoginMode = true;

        const authSection = document.getElementById('authSection');
        const appContainer = document.getElementById('appContainer');
        const searchInput = document.getElementById('searchInput');
        const resultsGrid = document.getElementById('resultsGrid');
        const teamList = document.getElementById('teamList');
        const teamCount = document.getElementById('teamCount');
        const loading = document.getElementById('loading');
        
        // Check session on load
        document.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('pokeUser');
            if (savedUser) {
                currentUser = savedUser;
                showApp();
            }
        });

        // AUTHENTICATION LOGIC
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? 'Iniciar Sesión' : 'Crear Cuenta';
            document.getElementById('btnAuthSubmit').innerHTML = isLoginMode ? 'Entrar <i class="fas fa-arrow-right"></i>' : 'Registrarse <i class="fas fa-user-plus"></i>';
            document.getElementById('authToggleText').innerHTML = isLoginMode 
                ? '¿No tienes cuenta? <span onclick="toggleAuthMode()">Regístrate aquí</span>'
                : '¿Ya tienes cuenta? <span onclick="toggleAuthMode()">Inicia sesión</span>';
        }

        async function handleAuth(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            
            if (!user || !pass) {
                showToast("Por favor, rellena todos los campos", "error");
                return;
            }

            const endpoint = isLoginMode ? '/users/login' : '/users/register';
            const btn = document.getElementById('btnAuthSubmit');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showToast(data.message || (isLoginMode ? "Login exitoso" : "Registro exitoso"), "success");
                    if (isLoginMode) {
                        currentUser = data.username || user;
                        localStorage.setItem('pokeUser', currentUser);
                        setTimeout(showApp, 500);
                    } else {
                        // Switch to login mode automatically after register
                        toggleAuthMode();
                        document.getElementById('password').value = '';
                    }
                } else {
                    showToast(data.error || "Error en la autenticación", "error");
                }
            } catch (error) {
                showToast("Error de conexión con el servidor", "error");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function showApp() {
            authSection.style.opacity = '0';
            setTimeout(() => {
                authSection.style.display = 'none';
                appContainer.style.display = 'flex';
                // Trigger reflow
                void appContainer.offsetWidth;
                appContainer.style.opacity = '1';
                
                document.getElementById('displayUsername').innerText = currentUser;
                loadTeam();
                searchPokemon('');
            }, 500);
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('pokeUser');
            
            appContainer.style.opacity = '0';
            setTimeout(() => {
                appContainer.style.display = 'none';
                authSection.style.display = 'flex';
                // Trigger reflow
                void authSection.offsetWidth;
                authSection.style.opacity = '1';
                
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                teamData = [];
            }, 500);
        }

        // APP LOGIC
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchPokemon(e.target.value.trim());
            }, 300);
        });

        async function searchPokemon(query) {
            if (!currentUser) return;
            
            resultsGrid.innerHTML = '';
            loading.style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/pokemon/search?name=${query}`);
                const data = await res.json();
                
                loading.style.display = 'none';
                
                if (data.length === 0) {
                    resultsGrid.innerHTML = '<p style="color:var(--text-muted); width: 100%; text-align:center;">No se encontraron Pokémon.</p>';
                    return;
                }

                const renderLimit = query === '' ? 50 : data.length;
                
                data.slice(0, renderLimit).forEach(poke => {
                    const isEnEquipo = teamData.some(t => t.pokemonId === poke.id);
                    
                    const card = document.createElement('div');
                    card.className = 'pokemon-card';
                    card.innerHTML = `
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${poke.id}.png" alt="${poke.name}" class="poke-sprite" loading="lazy">
                        <div class="poke-info-container">
                            <div class="poke-name">${poke.name}</div>
                            <span class="poke-id">#${poke.id.toString().padStart(4, '0')}</span>
                        </div>
                        <button class="btn-add" onclick="addToTeam(${poke.id}, '${poke.name}')" ${isEnEquipo ? 'disabled style="opacity:0.5; cursor:not-allowed;"' : ''}>
                            <i class="fas ${isEnEquipo ? 'fa-check' : 'fa-plus'}"></i> 
                            ${isEnEquipo ? 'En Equipo' : 'Añadir'}
                        </button>
                    `;
                    resultsGrid.appendChild(card);
                });
            } catch (error) {
                loading.style.display = 'none';
                showToast("Error al conectar con el servidor", "error");
            }
        }

        async function loadTeam() {
            if (!currentUser) return;
            
            try {
                const res = await fetch(`${API_BASE}/pokemon/team?username=${currentUser}`);
                teamData = await res.json();
                renderTeam();
                searchPokemon(searchInput.value.trim()); 
            } catch (error) {
                console.error("Error cargando equipo", error);
            }
        }

        function renderTeam() {
            teamCount.innerText = `${teamData.length}/6`;
            if (teamData.length >= 6) {
                teamCount.classList.add('full');
            } else {
                teamCount.classList.remove('full');
            }

            teamList.innerHTML = '';
            
            if (teamData.length === 0) {
                teamList.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:30px 0;"><p>Tu equipo está vacío.</p></div>';
                return;
            }

            teamData.forEach(member => {
                const div = document.createElement('div');
                div.className = 'team-member';
                div.innerHTML = `
                    <div class="member-info">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${member.pokemonId}.png" alt="${member.pokemonName}" style="width: 40px; height: 40px;">
                        <span class="member-name">${member.pokemonName}</span>
                    </div>
                    <button class="btn-remove" onclick="removeFromTeam(${member.id})">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                teamList.appendChild(div);
            });
        }

        async function addToTeam(pokemonId, pokemonName) {
            if (teamData.length >= 6) {
                showToast("¡Tu equipo ya está lleno!", "error");
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/pokemon/team`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pokemonId, pokemonName, username: currentUser })
                });

                if (res.ok) {
                    showToast(`${pokemonName.toUpperCase()} añadido`, "success");
                    loadTeam();
                } else {
                    const data = await res.json();
                    showToast(data.error || "Error al añadir", "error");
                }
            } catch (error) {
                showToast("Error de conexión", "error");
            }
        }

        async function removeFromTeam(id) {
            try {
                const res = await fetch(`${API_BASE}/pokemon/team/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast("Eliminado del equipo", "success");
                    loadTeam();
                }
            } catch (error) {
                showToast("Error de conexión", "error");
            }
        }

        function showToast(message, type = "success") {
            const toast = document.getElementById('toast');
            const msg = document.getElementById('toastMsg');
            toast.className = 'toast ' + type;
            msg.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
